# Local development stack — all three services on one isolated network.
#
# Prerequisites:
#   cp infra/.env.example infra/.env   # first time only
#   docker compose -f infra/docker-compose.yml up --build
#
# The API waits for postgres and redis to pass their healthchecks before
# starting, so the app never boots against an unavailable database.

services:
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-platform_db}
      POSTGRES_USER: ${DATABASE_USER:-platform_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-platform_pass}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-platform_user} -d ${DATABASE_NAME:-platform_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - platform

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    container_name: platform_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-6000}:6000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6000/api/v1/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - platform

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: platform_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Enables POST /-/reload to hot-reload config without restart.
      - '--web.enable-lifecycle'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - platform

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  platform:
    driver: bridge
